<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Usuários - Semantic Mesh</title>
    <link href="/static/output.css" rel="stylesheet">
    <link href="/static/app.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-50 via-blue-50 to-green-50 min-h-screen">
    <nav class="sm-nav">
        <a href="/dashboard" class="sm-nav-brand">⬡ Semantic Mesh</a>
        <div class="sm-nav-links">
            <a href="/organizations" class="sm-nav-link">Organizações</a>
            <a href="/analysis" class="sm-nav-link">Análises</a>
            <a href="/logout" class="sm-nav-link danger">Sair</a>
        </div>
    </nav>
    <div class="container mx-auto px-6">
        <div class="sm-card sm-card-md sm-fade mx-auto">
            <h2 class="sm-title">👥 {{ org.name }} — Usuários</h2>

            <form method="POST" action="/organizations/{{ org.id }}/add_user" style="display:flex; gap:0.75rem; margin-bottom:1.5rem;">
                <input type="email" name="email" placeholder="E-mail do usuário" required class="sm-input">
                <button type="submit" class="sm-btn sm-btn-green" style="white-space:nowrap;">Adicionar</button>
            </form>

            <div class="sm-table-wrap">
                <table class="sm-table">
                    <thead>
                        <tr><th>Nome</th><th>E-mail</th><th></th></tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td style="font-weight:600;">{{ user.name }}</td>
                            <td class="muted">{{ user.email }}</td>
                            <td>
                                <form method="POST" action="/organizations/{{ org.id }}/remove_user" style="display:inline;">
                                    <input type="hidden" name="user_id" value="{{ user.id }}">
                                    <button type="submit" class="sm-btn sm-btn-red sm-btn-sm">Remover</button>
                                </form>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
            <a href="/organizations" class="sm-btn sm-btn-gray" style="display:block; text-align:center; margin-top:1.5rem;">← Voltar</a>
        </div>
    </div>
</body>
</html>
