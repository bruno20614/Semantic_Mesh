<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Usuários da Organização - Semantic Mesh</title>
    <link href="/static/output.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-100 via-blue-200 to-green-100 min-h-screen">
    <nav class="bg-white shadow-lg p-6 flex justify-between items-center rounded-b-2xl animate-fade-in">
        <h1 class="font-extrabold text-2xl text-purple-700 tracking-tight">Semantic Mesh App</h1>
        <a href="/logout" class="text-red-600 font-semibold hover:text-red-800 transition">Sair</a>
    </nav>
    <div class="container mx-auto mt-16 p-8">
        <div class="bg-white rounded-3xl shadow-2xl p-10 animate-fade-in max-w-2xl mx-auto">
            <h2 class="text-3xl font-extrabold text-blue-700 mb-6">Usuários da Organização: {{ org.name }}</h2>
            <form method="POST" action="/organizations/{{ org.id }}/add_user" class="mb-6 flex gap-2">
                <input type="email" name="email" placeholder="E-mail do usuário" required class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-purple-600">
                <button type="submit" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded transition">Adicionar</button>
            </form>
            <table class="min-w-full divide-y divide-gray-200">
                <thead>
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Nome</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">E-mail</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Ação</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    {% for user in users %}
                    <tr>
                        <td class="px-6 py-4 whitespace-nowrap">{{ user.name }}</td>
                        <td class="px-6 py-4 whitespace-nowrap">{{ user.email }}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <form method="POST" action="/organizations/{{ org.id }}/remove_user" class="inline">
                                <input type="hidden" name="user_id" value="{{ user.id }}">
                                <button type="submit" class="bg-red-500 hover:bg-red-700 text-white font-bold py-1 px-3 rounded transition">Remover</button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            <a href="/organizations" class="block text-center text-blue-600 text-base mt-8 font-semibold hover:underline transition">← Voltar para Organizações</a>
        </div>
    </div>
</body>
</html>
