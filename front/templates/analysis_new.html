<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova Análise - Semantic Mesh</title>
    <link href="/static/output.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-100 via-blue-200 to-green-100 min-h-screen">
    <nav class="bg-white shadow-lg p-6 flex justify-between items-center rounded-b-2xl">
        <h1 class="font-extrabold text-2xl text-purple-700 tracking-tight">Semantic Mesh App</h1>
        <div class="flex gap-4 items-center">
            <a href="/analysis" class="text-purple-600 font-semibold hover:text-purple-800 transition">Análises</a>
            <a href="/logout" class="text-red-600 font-semibold hover:text-red-800 transition">Sair</a>
        </div>
    </nav>

    <div class="container mx-auto mt-16 p-8 max-w-xl">
        <div class="bg-white rounded-3xl shadow-2xl p-10">
            <h2 class="text-3xl font-extrabold text-purple-700 mb-8">Nova Análise</h2>

            {% if error %}
                <div class="mb-6 p-4 rounded-lg bg-red-100 border-l-4 border-red-500 text-red-700">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/analysis/new" class="flex flex-col gap-5">

                <div>
                    <label class="block text-gray-700 font-bold mb-1">Organização</label>
                    <select name="org_id" required class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        {% for org in orgs %}
                            <option value="{{ org.id }}">{{ org.name }}</option>
                        {% endfor %}
                    </select>
                    <p class="text-xs text-gray-400 mt-1">Os documentos desta organização serão usados na análise.</p>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-1">Modelo</label>
                    <select name="model" class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="sem_modelo">Nenhum (reservado para IA futura)</option>
                        <option value="bert-base">BERT Base</option>
                        <option value="sentence-transformers">Sentence Transformers</option>
                        <option value="openai-embeddings">OpenAI Embeddings</option>
                    </select>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-1">
                        Limiar de Similaridade
                        <span class="text-purple-600 font-extrabold" id="threshold-val">0.75</span>
                    </label>
                    <input type="range" name="similarity_threshold" min="0" max="1" step="0.05" value="0.75"
                        class="w-full accent-purple-600"
                        oninput="document.getElementById('threshold-val').textContent = this.value">
                    <p class="text-xs text-gray-400 mt-1">Documentos com similaridade acima deste valor serão agrupados.</p>
                </div>

                <div>
                    <label class="block text-gray-700 font-bold mb-1">Máximo de Clusters</label>
                    <input type="number" name="max_clusters" value="5" min="1" max="50"
                        class="w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-purple-500">
                </div>

                <div class="flex gap-3 mt-4">
                    <button type="submit"
                        style="background: #7c3aed; color: #fff; font-weight: bold; padding: 0.6rem 1.5rem; border-radius: 0.5rem; border: none; cursor: pointer;">
                        Criar Análise
                    </button>
                    <a href="/analysis"
                        style="background: #e5e7eb; color: #374151; font-weight: bold; padding: 0.6rem 1.5rem; border-radius: 0.5rem; text-decoration: none;">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
