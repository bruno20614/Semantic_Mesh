<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Nova Análise - Semantic Mesh</title>
    <link href="/static/output.css" rel="stylesheet">
    <link href="/static/app.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-50 via-blue-50 to-green-50 min-h-screen">
    <nav class="sm-nav">
        <a href="/dashboard" class="sm-nav-brand">⬡ Semantic Mesh</a>
        <div class="sm-nav-links">
            <a href="/analysis" class="sm-nav-link">Análises</a>
            <a href="/organizations" class="sm-nav-link">Organizações</a>
            <a href="/logout" class="sm-nav-link danger">Sair</a>
        </div>
    </nav>

    <div class="container mx-auto px-6">
        <div class="sm-card sm-card-sm sm-fade mx-auto">
            <h2 class="sm-title">🔬 Nova Análise</h2>

            {% if error %}
                <div class="sm-alert sm-alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/analysis/new">
                <div class="sm-form-group">
                    <label class="sm-label">Organização</label>
                    <select name="org_id" required class="sm-input sm-select">
                        {% for org in orgs %}
                            <option value="{{ org.id }}">{{ org.name }}</option>
                        {% endfor %}
                    </select>
                    <div class="sm-hint">Os documentos desta organização serão usados na análise.</div>
                </div>

                <div class="sm-form-group">
                    <label class="sm-label">Modelo</label>
                    <select name="model" class="sm-input sm-select">
                        <option value="sem_modelo">Nenhum (reservado para IA futura)</option>
                        <option value="bert-base">BERT Base</option>
                        <option value="sentence-transformers">Sentence Transformers</option>
                        <option value="openai-embeddings">OpenAI Embeddings</option>
                    </select>
                </div>

                <div class="sm-form-group">
                    <label class="sm-label">
                        Limiar de Similaridade:
                        <span id="threshold-val" style="color:#7c3aed; font-weight:900;">0.75</span>
                    </label>
                    <input type="range" name="similarity_threshold" min="0" max="1" step="0.05" value="0.75"
                        style="width:100%; accent-color:#7c3aed;"
                        oninput="document.getElementById('threshold-val').textContent = this.value">
                    <div class="sm-hint">Documentos com similaridade acima deste valor serão agrupados.</div>
                </div>

                <div class="sm-form-group">
                    <label class="sm-label">Máximo de Clusters</label>
                    <input type="number" name="max_clusters" value="5" min="1" max="50" class="sm-input">
                </div>

                <div style="display:flex; gap:0.75rem; margin-top:1rem;">
                    <button type="submit" class="sm-btn sm-btn-primary" style="flex:1;">Criar Análise</button>
                    <a href="/analysis" class="sm-btn sm-btn-gray" style="flex:1; text-align:center;">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
