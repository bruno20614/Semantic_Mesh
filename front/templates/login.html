<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Semantic Mesh</title>
    <link href="/static/output.css" rel="stylesheet">
    <link href="/static/app.css" rel="stylesheet">
</head>
<body style="min-height:100vh; display:flex; background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 50%, #d1fae5 100%);">
    <div class="hidden md:flex" style="flex:1; align-items:center; justify-content:center; padding:2rem;">
        <div style="background:#fff; border-radius:2rem; box-shadow:0 8px 40px rgba(124,58,237,0.12); padding:2.5rem;">
            <img src="{{ request.url_for('static', path='semantic_mesh.png') }}" alt="Semantic Mesh" style="max-width:320px; border-radius:1.2rem; transition:transform 0.4s;" onmouseover="this.style.transform='scale(1.05) rotate(2deg)'" onmouseout="this.style.transform=''">
        </div>
    </div>
    <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:2rem;">
        <div class="sm-card sm-card-sm sm-fade" style="width:100%; max-width:420px; margin:0;">
            <div style="text-align:center; margin-bottom:1.5rem;">
                <div style="font-size:2.5rem;">⬡</div>
                <h2 style="font-size:1.6rem; font-weight:900; color:#1e1b4b; margin:0.25rem 0 0.25rem;">Semantic Mesh</h2>
                <p style="color:#9ca3af; font-size:0.875rem;">Acesse sua conta</p>
            </div>

            {% if error %}
                <div class="sm-alert sm-alert-error">{{ error }}</div>
            {% endif %}
            {% if success %}
                <div class="sm-alert sm-alert-success">{{ success }}</div>
            {% endif %}

            <form method="POST" action="/">
                <div class="sm-form-group">
                    <label class="sm-label">Usuário</label>
                    <input class="sm-input" name="username" type="text" required autocomplete="username">
                </div>
                <div class="sm-form-group">
                    <label class="sm-label">Senha</label>
                    <input class="sm-input" name="password" type="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="sm-btn sm-btn-primary" style="width:100%; margin-top:0.5rem; padding:0.7rem; font-size:1rem;">Entrar</button>
            </form>
            <p style="text-align:center; font-size:0.875rem; color:#6b7280; margin-top:1.25rem;">
                Não tem conta? <a href="/register" style="color:#7c3aed; font-weight:700;">Cadastre-se</a>
            </p>
        </div>
    </div>
</body>
</html>
