<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Adicionar Documento - Semantic Mesh</title>
    <link href="/static/output.css" rel="stylesheet">
    <link href="/static/app.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-50 via-blue-50 to-green-50 min-h-screen">
    <nav class="sm-nav">
        <a href="/dashboard" class="sm-nav-brand">⬡ Semantic Mesh</a>
        <div class="sm-nav-links">
            <a href="/organizations/{{ org.id }}/documents" class="sm-nav-link">← Documentos</a>
            <a href="/logout" class="sm-nav-link danger">Sair</a>
        </div>
    </nav>
    <div class="container mx-auto px-6">
        <div class="sm-card sm-card-sm sm-fade mx-auto">
            <h2 class="sm-title">📎 Adicionar Documento</h2>
            <p style="color:#6b7280; font-size:0.875rem; margin-bottom:1.25rem;">Organização: <strong>{{ org.name }}</strong></p>

            {% if message %}
                <div class="sm-alert {{ 'sm-alert-success' if success else 'sm-alert-error' }}">{{ message }}</div>
            {% endif %}

            <form method="post" enctype="multipart/form-data">
                <div id="dropzone" style="border: 2px dashed #7c3aed; border-radius: 1rem; background: #faf5ff; padding: 2.5rem; text-align: center; cursor: pointer; transition: all 0.2s; margin-bottom: 1rem;" onclick="document.getElementById('file').click()" ondragover="event.preventDefault(); this.style.background='#ede9fe';" ondragleave="this.style.background='#faf5ff';" ondrop="event.preventDefault(); this.style.background='#faf5ff'; document.getElementById('file').files = event.dataTransfer.files; updateLabel();">
                    <div style="font-size:2rem; margin-bottom:0.5rem;">📁</div>
                    <span id="drop-label" style="color:#7c3aed; font-weight:700;">Arraste ou clique para selecionar</span>
                    <p style="color:#9ca3af; font-size:0.8rem; margin-top:0.4rem;">PDF, DOCX, TXT, PNG, JPG, JPEG, TIFF, BMP, WEBP</p>
                    <input type="file" name="file" id="file" required accept=".pdf,.docx,.txt,.png,.jpg,.jpeg,.tiff,.tif,.bmp,.webp" style="display:none;" onchange="updateLabel()">
                </div>
                <button type="submit" class="sm-btn sm-btn-green" style="width:100%; padding:0.7rem; font-size:1rem;">Enviar</button>
            </form>
        </div>
    </div>
    <script>
    function updateLabel() {
        const f = document.getElementById('file');
        const lbl = document.getElementById('drop-label');
        if (f.files && f.files[0]) lbl.textContent = '✅ ' + f.files[0].name;
    }
    </script>
</body>
</html>
