<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Criar Organização - Semantic Mesh</title>
    <link href="/static/output.css" rel="stylesheet">
    <link href="/static/app.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-50 via-blue-50 to-green-50 min-h-screen">
    <nav class="sm-nav">
        <a href="/dashboard" class="sm-nav-brand">⬡ Semantic Mesh</a>
        <div class="sm-nav-links">
            <a href="/organizations" class="sm-nav-link">Organizações</a>
            <a href="/logout" class="sm-nav-link danger">Sair</a>
        </div>
    </nav>
    <div class="container mx-auto px-6">
        <div class="sm-card sm-card-sm sm-fade mx-auto">
            <h2 class="sm-title">🏢 Nova Organização</h2>
            {% if message %}
                <div class="sm-alert {{ 'sm-alert-success' if success else 'sm-alert-error' }}">{{ message }}</div>
            {% endif %}
            <form method="post">
                <div class="sm-form-group">
                    <label class="sm-label">Nome da Organização</label>
                    <input type="text" name="name" class="sm-input" required>
                </div>
                <div style="display:flex; gap:0.75rem; margin-top:0.5rem;">
                    <button type="submit" class="sm-btn sm-btn-green" style="flex:1;">Criar</button>
                    <a href="/organizations" class="sm-btn sm-btn-gray" style="flex:1; text-align:center;">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
