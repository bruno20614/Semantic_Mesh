<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel - Semantic Mesh</title>
    <link href="/static/output.css" rel="stylesheet">

</head>
<body class="bg-gradient-to-br from-purple-100 via-blue-200 to-green-100 min-h-screen">
    <nav class="bg-white shadow-lg p-6 flex justify-between items-center rounded-b-2xl animate-fade-in">
        <h1 class="font-extrabold text-2xl text-purple-700 tracking-tight">Semantic Mesh App</h1>
        <form method="POST" action="/set_active_org" class="flex items-center gap-2">
            <select name="active_org" class="border rounded px-2 py-1">
                {% for org in organizations %}
                    <option value="{{ org.id }}" {% if org.id == active_org_id %}selected{% endif %}>{{ org.name }}</option>
                {% endfor %}
            </select>
            <button type="submit" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-1 px-3 rounded transition">Selecionar</button>
        </form>
        <a href="/organizations" class="bg-yellow-400 hover:bg-yellow-500 text-purple-900 font-extrabold py-2 px-4 rounded-lg shadow-lg transition mr-4 flex items-center gap-2" title="Gerencie suas organizações">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a4 4 0 00-3-3.87M9 20H4v-2a4 4 0 013-3.87m6 0A4 4 0 0012 4a4 4 0 00-1 7.87M12 4v16" /></svg>
    Organizações
    {% if organizations|length == 0 %}
        <span class="ml-2 bg-red-500 text-white text-xs font-bold px-2 py-1 rounded-full animate-pulse" title="Nenhuma organização cadastrada">!</span>
    {% endif %}
</a>
        <a href="/logout" class="text-red-600 font-semibold hover:text-red-800 transition">Sair</a>
    </nav>
    <div class="container mx-auto mt-16 p-8">
        <div class="bg-white rounded-3xl shadow-2xl p-10 animate-fade-in">
            <h2 class="text-4xl font-extrabold text-blue-700 mb-6">Bem-vindo, {{ username }}!</h2>
            <p class="mt-4 text-gray-600 text-lg">Seu ambiente de otimização Graph-Aware RAG está pronto para ser iniciado.</p>
        </div>
    </div>
</body>
</html>
