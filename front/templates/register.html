<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - Semantic Mesh</title>
    <link href="/static/output.css" rel="stylesheet">
    <link href="/static/app.css" rel="stylesheet">
</head>
<body style="min-height:100vh; display:flex; background: linear-gradient(135deg, #d1fae5 0%, #dbeafe 50%, #ede9fe 100%);">
    <div class="hidden md:flex" style="flex:1; align-items:center; justify-content:center; padding:2rem;">
        <div style="background:#fff; border-radius:2rem; box-shadow:0 8px 40px rgba(34,197,94,0.10); padding:2.5rem;">
            <img src="{{ request.url_for('static', path='semantic_mesh.png') }}" alt="Semantic Mesh" style="max-width:320px; border-radius:1.2rem;">
        </div>
    </div>
    <div style="flex:1; display:flex; align-items:center; justify-content:center; padding:2rem;">
        <div class="sm-card sm-card-sm sm-fade" style="width:100%; max-width:420px; margin:0;">
            <div style="text-align:center; margin-bottom:1.5rem;">
                <div style="font-size:2.5rem;">⬡</div>
                <h2 style="font-size:1.6rem; font-weight:900; color:#1e1b4b; margin:0.25rem 0 0.25rem;">Criar conta</h2>
                <p style="color:#9ca3af; font-size:0.875rem;">Preencha os dados abaixo</p>
            </div>

            {% if error %}
                <div class="sm-alert sm-alert-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/register">
                <div class="sm-form-group">
                    <label class="sm-label">Nome de usuário</label>
                    <input class="sm-input" name="name" type="text" required autocomplete="username">
                </div>
                <div class="sm-form-group">
                    <label class="sm-label">E-mail</label>
                    <input class="sm-input" name="email" type="email" required autocomplete="email">
                </div>
                <div class="sm-form-group">
                    <label class="sm-label">Senha</label>
                    <input class="sm-input" name="password" type="password" required autocomplete="new-password">
                </div>
                <button type="submit" class="sm-btn sm-btn-green" style="width:100%; margin-top:0.5rem; padding:0.7rem; font-size:1rem;">Cadastrar</button>
            </form>
            <p style="text-align:center; font-size:0.875rem; color:#6b7280; margin-top:1.25rem;">
                Já tem conta? <a href="/" style="color:#7c3aed; font-weight:700;">Fazer login</a>
            </p>
        </div>
    </div>
</body>
</html>
