<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Remover Organização - Semantic Mesh</title>
    <link href="/static/output.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-100 via-blue-200 to-green-100 min-h-screen">
    <nav class="bg-white shadow-lg p-6 flex justify-between items-center rounded-b-2xl animate-fade-in">
        <h1 class="font-extrabold text-2xl text-purple-700 tracking-tight">Semantic Mesh App</h1>
        <a href="/logout" class="text-red-600 font-semibold hover:text-red-800 transition">Sair</a>
    </nav>
    <div class="container mx-auto mt-16 p-8">
        <div class="bg-white rounded-3xl shadow-2xl p-10 animate-fade-in max-w-lg mx-auto">
            <h2 class="text-3xl font-extrabold text-red-700 mb-6">Remover Organização</h2>
            <p class="mb-6 text-gray-700">Tem certeza que deseja remover a organização <span class="font-bold">{{ org.name }}</span>?</p>
            <form method="POST" action="/organizations/{{ org.id }}/delete">
                <button class="bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline w-full transition duration-300" type="submit">
                    Remover
                </button>
            </form>
            <a href="/organizations" class="block text-center text-gray-600 text-sm mt-6 hover:underline">Cancelar</a>
        </div>
    </div>
</body>
</html>
